# -----------------------------------------------------------------------------
# Collector (self-timed loop).
#
# WHY A LOOP: GitHub's scheduler is unreliable for frequent crons — it was
# launching us only every ~3 hours instead of every 30 minutes. So instead of
# relying on the scheduler for timing, ONE job stays alive and polls every
# 30 minutes on the runner's OWN clock (poll -> sleep -> poll). The scheduler is
# now only used to (re)start the loop a few times a day, which it handles fine.
#
# A single GitHub job caps at 6 hours, and our window (7am-9pm Pacific) is 14h,
# so the loop runs ~5.5h then hands off to the next scheduled/queued run. The
# concurrency group keeps exactly one loop alive at a time.
# -----------------------------------------------------------------------------
name: Collect charger availability

on:
  schedule:
    # Hourly kick-offs across the window (UTC 14:00-04:00 = 7am-9pm Pacific).
    # Only one loop runs at a time; extra kick-offs just keep one queued to
    # take over when a 5.5h loop ends.
    - cron: "3 14-23,0-4 * * *"
  workflow_dispatch:
    inputs:
      max_minutes:
        description: "Loop duration cap (minutes)"
        default: "330"
      sleep_seconds:
        description: "Seconds between polls"
        default: "1800"

permissions:
  contents: write

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350           # under GitHub's 6h job cap
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll loop (self-timed, 30-min cadence)
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
          MAX_MINUTES: ${{ github.event.inputs.max_minutes || '330' }}
          SLEEP_SECONDS: ${{ github.event.inputs.sleep_seconds || '1800' }}
        run: |
          git config user.name  "ev-data-bot"
          git config user.email "actions@users.noreply.github.com"
          end=$(( $(date +%s) + 60 * MAX_MINUTES ))
          while [ "$(date +%s)" -lt "$end" ]; do
            h=$(TZ=America/Los_Angeles date +%H); h=$((10#$h))
            if [ "$h" -lt 7 ] || [ "$h" -ge 21 ]; then
              echo "Outside 7am-9pm Pacific — stopping loop."
              break
            fi
            python src/run_due.py || true
            git add data/
            if ! git diff --cached --quiet; then
              git commit -m "data: collection run $(date -u +'%Y-%m-%dT%H:%MZ')" || true
              git pull --rebase --autostash origin main || true
              git push || true
            else
              echo "Nothing new this cycle."
            fi
            # Stop early if the next sleep would run past our time budget.
            if [ "$(( $(date +%s) + SLEEP_SECONDS ))" -ge "$end" ]; then
              echo "Time budget reached — ending loop; next run will continue."
              break
            fi
            echo "Sleeping ${SLEEP_SECONDS}s until next poll..."
            sleep "$SLEEP_SECONDS"
          done
