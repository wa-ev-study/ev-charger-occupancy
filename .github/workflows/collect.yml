# -----------------------------------------------------------------------------
# Collector (self-timed, self-CHAINING loop).
#
# WHY: GitHub's scheduler is unreliable — it won't reliably start our job, and a
# single job caps at 6 hours (our window is 14h). So:
#   1. One job polls every 30 min on the runner's OWN clock (reliable cadence).
#   2. At the end of its ~5.5h budget it LAUNCHES THE NEXT JOB ITSELF
#      (self-chaining), so it no longer depends on the scheduler to restart, and
#      runs continuously across the whole 7am-9pm window (and overnight, where it
#      simply idles because run_due only polls inside the window).
# The schedule below is now only a safety net to restart the chain if it ever
# breaks. Concurrency keeps exactly one loop alive at a time.
# -----------------------------------------------------------------------------
name: Collect charger availability

on:
  schedule:
    - cron: "17 */4 * * *"        # safety-net restart every 4h (deduped by concurrency)
  workflow_dispatch:
    inputs:
      max_minutes:
        description: "Loop duration cap (minutes)"
        default: "330"
      sleep_seconds:
        description: "Seconds between polls"
        default: "1800"

permissions:
  contents: write
  actions: write                  # needed to launch the next loop (self-chain)

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Poll loop (self-timed, 30-min cadence)
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
          MAX_MINUTES: ${{ github.event.inputs.max_minutes || '330' }}
          SLEEP_SECONDS: ${{ github.event.inputs.sleep_seconds || '1800' }}
        run: |
          git config user.name  "ev-data-bot"
          git config user.email "actions@users.noreply.github.com"
          end=$(( $(date +%s) + 60 * MAX_MINUTES ))
          while [ "$(date +%s)" -lt "$end" ]; do
            python src/run_due.py || true       # run_due only polls inside 7am-9pm Pacific
            git add data/
            if ! git diff --cached --quiet; then
              git commit -m "data: collection run $(date -u +'%Y-%m-%dT%H:%MZ')" || true
              git pull --rebase --autostash origin main || true
              git push || true
            fi
            if [ "$(( $(date +%s) + SLEEP_SECONDS ))" -ge "$end" ]; then break; fi
            sleep "$SLEEP_SECONDS"
          done

      - name: Self-chain to next loop
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          today=$(date -u +%Y-%m-%d)
          if [[ "$today" > "2026-08-31" ]]; then
            echo "Past chain-until date (2026-08-31); not re-launching."
          else
            gh workflow run collect.yml -f max_minutes=330 -f sleep_seconds=1800 \
              && echo "Launched next loop." || echo "Chain dispatch failed."
          fi
