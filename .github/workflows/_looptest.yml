name: _loop test (throwaway)
on:
  push:
    branches: [main]
permissions:
  contents: write
concurrency:
  group: collector
  cancel-in-progress: false
jobs:
  looptest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: short loop
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
          MAX_MINUTES: "3"
          SLEEP_SECONDS: "60"
        run: |
          git config user.name "ev-data-bot"
          git config user.email "actions@users.noreply.github.com"
          rm -f data/usage/last_run.json
          end=$(( $(date +%s) + 60 * MAX_MINUTES ))
          while [ "$(date +%s)" -lt "$end" ]; do
            h=$(TZ=America/Los_Angeles date +%H); h=$((10#$h))
            if [ "$h" -lt 7 ] || [ "$h" -ge 21 ]; then echo "outside window"; break; fi
            python src/run_due.py || true
            git add data/
            if ! git diff --cached --quiet; then
              git commit -m "LOOPTEST poll $(date -u +'%H:%MZ')" || true
              git pull --rebase --autostash origin main || true
              git push || true
            else echo "nothing new"; fi
            if [ "$(( $(date +%s) + SLEEP_SECONDS ))" -ge "$end" ]; then echo "budget reached"; break; fi
            sleep "$SLEEP_SECONDS"
          done
