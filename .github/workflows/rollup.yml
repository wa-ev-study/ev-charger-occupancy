name: Nightly report + email

# Runs once a day at 04:15 UTC = 9:15 PM Pacific (PDT), just after the day's
# 7am-9pm collection window closes. Refreshes the station list (and tags funded
# / apartment-condo chargers via NREL when reachable), rolls up the day, builds
# one Excel report (Today + Running Total), commits it, and emails it.

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Refresh stations, roll up, build report
        env:
          NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: |
          mkdir -p data/master data/reports
          set +e
          {
            echo "===== REFRESH STATION LIST (+ NREL enrichment) ====="
            python src/stations.py Bellevue
            echo "===== ROLLUP + PRUNE ====="
            python src/rollup.py
            echo "===== BUILD EXCEL REPORT ====="
            python src/build_report.py
          } > data/master/_last_run_log.txt 2>&1
          echo "exit=$?" >> data/master/_last_run_log.txt
          cat data/master/_last_run_log.txt

      - name: Commit report + summaries
        run: |
          git config user.name  "ev-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/
          if ! git diff --cached --quiet; then
            git commit -m "nightly report: $(date -u +'%Y-%m-%d')"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "Nothing new to commit."
          fi

      - name: Email the report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/send_report.py
