name: Daily rollup

on:
  push:
    branches: [main]        # TEMP: lets a code push trigger a run for debugging.
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  rollup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Build station list (logged)
        env:
          NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: |
          mkdir -p data/master
          set +e
          python src/_probe.py > data/master/_build_log.txt 2>&1
          echo "exit_code=$?" >> data/master/_build_log.txt
          echo "----- build log tail -----"
          cat data/master/_build_log.txt

      - name: Roll up (best effort)
        run: python src/rollup.py 2>&1 | tee -a data/master/_build_log.txt || echo "rollup skipped"

      - name: Commit results + log
        run: |
          git config user.name  "ev-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/
          if ! git diff --cached --quiet; then
            git commit -m "run: build log $(date -u +'%Y-%m-%dT%H:%MZ')"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "No changes to commit."
          fi
