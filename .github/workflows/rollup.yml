# -----------------------------------------------------------------------------
# Nightly rollup.
# Once a day (just after the daytime window closes) this turns the day's raw
# observations into the small permanent summary files and prunes old raw data.
# Runs at 04:30 UTC = ~9:30 PM Pacific (after 9 PM collection ends).
# -----------------------------------------------------------------------------
name: Daily rollup

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collector              # share the lock so it never clashes with a poll.
  cancel-in-progress: false

jobs:
  rollup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Refresh the station master list (weekly-ish, cheap)
        env:
          NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: python src/stations.py Bellevue Seattle || echo "station refresh skipped"
      - name: Roll up yesterday/today and prune
        run: python src/rollup.py
      - name: Commit summaries
        run: |
          git config user.name  "ev-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "rollup: $(date -u +'%Y-%m-%d')"
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push
          else
            echo "Nothing to roll up."
          fi
