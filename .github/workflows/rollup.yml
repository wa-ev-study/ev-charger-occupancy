name: Daily rollup

on:
  schedule:
    - cron: "30 4 * * *"     # ~9:30 PM Pacific, after collection closes.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  rollup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Refresh station list and roll up
        env:
          NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: |
          mkdir -p data/master
          set +e
          {
            echo "===== REFRESH STATION LIST ====="
            python src/stations.py Bellevue
            echo "===== ROLLUP + PRUNE ====="
            python src/rollup.py
          } > data/master/_last_run_log.txt 2>&1
          echo "exit=$?" >> data/master/_last_run_log.txt
          cat data/master/_last_run_log.txt

      - name: Commit summaries
        run: |
          git config user.name  "ev-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/
          if ! git diff --cached --quiet; then
            git commit -m "rollup: $(date -u +'%Y-%m-%d')"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "Nothing to roll up."
          fi
