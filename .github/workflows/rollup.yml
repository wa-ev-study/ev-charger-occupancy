name: Nightly report + email (manual backup)

# NOTE: The nightly report + email now runs from the always-on collector loop
# (collect.yml), NOT from a GitHub cron — GitHub was silently dropping this daily
# schedule. This workflow is kept only as a MANUAL backup (run it by hand from
# the Actions tab if you ever need to regenerate/resend a report).

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Refresh stations, roll up, build report
        env:
          NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: |
          mkdir -p data/master data/reports
          set +e
          {
            echo "===== REFRESH STATION LIST (+ NREL enrichment) ====="
            python src/stations.py Bellevue
            echo "===== ROLLUP + PRUNE ====="
            python src/rollup.py
            echo "===== BUILD EXCEL REPORT ====="
            python src/build_report.py
          } > data/master/_last_run_log.txt 2>&1
          echo "exit=$?" >> data/master/_last_run_log.txt
          cat data/master/_last_run_log.txt

      - name: Commit report + summaries
        run: |
          git config user.name  "ev-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/
          if ! git diff --cached --quiet; then
            git commit -m "nightly report: $(date -u +'%Y-%m-%d')"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "Nothing new to commit."
          fi

      - name: Email the report
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python src/send_report.py
