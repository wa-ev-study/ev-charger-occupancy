name: _chaintest
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      n:
        default: "1"
permissions:
  contents: write
  actions: write
jobs:
  hop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
          N: ${{ github.event.inputs.n || '1' }}
        run: |
          git config user.name "ev-data-bot"; git config user.email "a@b.c"
          echo "hop $N at $(date -u +%H:%M:%S)" >> data/master/_chaintest.log
          git add data/master/_chaintest.log
          git commit -m "chaintest hop $N" || true
          git pull --rebase --autostash origin main || true
          git push || true
          if [ "$N" -lt 3 ]; then
            gh workflow run _chaintest.yml -f n=$((N+1)) && echo "dispatched hop $((N+1))" || echo "dispatch FAILED"
          fi
